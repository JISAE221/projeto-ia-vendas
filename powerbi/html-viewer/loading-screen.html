<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA Vendas — Carregando</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden}
  body{
    background:#09091A;
    background-image:radial-gradient(ellipse 70% 50% at 50% 0%, rgba(139,92,246,0.10) 0%, transparent 70%);
    font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,Roboto,Helvetica,Arial,sans-serif;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;color:#FFFFFF;
  }
  .wrap{display:flex;flex-direction:column;align-items:center;gap:26px;text-align:center}

  /* Marca: 3 barras descendentes (logo IA Vendas) */
  .lockup{display:flex;align-items:center;gap:16px}
  .mark{display:flex;flex-direction:column;gap:6px;align-items:flex-start}
  .bar{height:5px;border-radius:9999px;background:#8B5CF6;transform-origin:left center;
       animation:pulse 1.4s ease-in-out infinite}
  .bar.b1{width:54px;animation-delay:0s}
  .bar.b2{width:34px;animation-delay:0.18s}
  .bar.b3{width:18px;animation-delay:0.36s}
  @keyframes pulse{
    0%,100%{opacity:.35;transform:scaleX(.82)}
    50%    {opacity:1;  transform:scaleX(1)}
  }

  .wordmark{display:flex;flex-direction:column;align-items:flex-start}
  .name{font-size:34px;font-weight:700;letter-spacing:-0.03em;line-height:1;color:#FFFFFF}
  .sub{font-size:10px;font-weight:400;letter-spacing:0.16em;text-transform:uppercase;
       color:#70709A;margin-top:7px}

  /* Barra de progresso indeterminada */
  .track{position:relative;width:200px;height:3px;border-radius:9999px;
         background:rgba(255,255,255,0.07);overflow:hidden}
  .track::after{content:'';position:absolute;top:0;left:0;height:100%;width:40%;
    border-radius:9999px;
    background:linear-gradient(90deg,#7C3AED,#8B5CF6,#A78BFA);
    animation:slide 1.5s cubic-bezier(.65,0,.35,1) infinite}
  @keyframes slide{
    0%{left:-40%}
    100%{left:100%}
  }

  .status{font-size:12px;letter-spacing:0.04em;color:#B0B0CC}
  .status span{
    display:inline-block;animation:blink 1.4s steps(1) infinite}
  .status span:nth-child(2){animation-delay:.2s}
  .status span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,100%{opacity:0}50%{opacity:1}}
</style>
</head>
<body>
  <div class="wrap">
    <div class="lockup">
      <div class="mark">
        <span class="bar b1"></span>
        <span class="bar b2"></span>
        <span class="bar b3"></span>
      </div>
      <div class="wordmark">
        <div class="name">IA Vendas</div>
        <div class="sub">Grupo 4 · Biopark Edu</div>
      </div>
    </div>

    <div class="track"></div>

    <div class="status">Carregando dados<span>.</span><span>.</span><span>.</span></div>
  </div>
</body>
</html>
