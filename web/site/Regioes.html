<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>IA Vendas - Regiões</title><style>  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#09091A; --panel:rgba(20,20,44,0.50); --panel-glass:rgba(20,20,44,0.46);
    --border:rgba(255,255,255,0.09); --border-strong:rgba(255,255,255,0.16);
    --txt:#E6E6F0; --muted:#9090AE; --accent:#8B5CF6; --accent-soft:rgba(139,92,246,0.18);
  }
  html,body{height:100%}
  body{background:var(--bg);color:var(--txt);font-family:"Segoe UI",-apple-system,BlinkMacSystemFont,sans-serif;overflow:hidden;
    background-image:radial-gradient(520px 760px at -4% 42%,rgba(139,92,246,0.22),transparent 68%),radial-gradient(900px 600px at 82% -6%,rgba(139,92,246,0.10),transparent 60%),radial-gradient(800px 600px at 6% 108%,rgba(139,92,246,0.07),transparent 60%);}
  .frame{position:fixed;top:84px;left:96px;right:16px;bottom:16px;border-radius:16px;overflow:hidden;box-shadow:0 18px 50px -20px rgba(0,0,0,0.7),0 0 0 1px var(--border)}
  .frame iframe{position:absolute;top:0;left:0;width:calc(100% + 17px);height:calc(100% + 58px);border:none}
  .topbar{position:fixed;top:16px;left:96px;right:16px;height:56px;z-index:35;display:flex;align-items:center;padding:0 22px;border-radius:14px;
    background:var(--panel-glass);backdrop-filter:blur(18px) saturate(1.4);-webkit-backdrop-filter:blur(18px) saturate(1.4);
    border:1px solid var(--border-strong);box-shadow:0 10px 30px -12px rgba(0,0,0,0.65),inset 0 1px 0 rgba(255,255,255,0.05)}
  .topbar h1{font-size:17px;font-weight:600;letter-spacing:-0.01em}
  .topbar .crumb{font-size:11.5px;color:var(--muted);margin-left:10px;font-weight:500}
  /* sidebar */
  .sidebar{position:fixed;top:16px;bottom:16px;left:16px;width:68px;z-index:40;
    display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:3px;border-radius:18px;overflow:hidden;
    background:var(--panel);backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px) saturate(1.4);
    border:1px solid var(--border-strong);box-shadow:0 16px 48px -14px rgba(0,0,0,0.7),inset 0 1px 0 rgba(255,255,255,0.06);
    transition:width .34s cubic-bezier(.4,0,.15,1),padding .34s cubic-bezier(.4,0,.15,1);cursor:pointer}
  .sidebar:hover,.sidebar.open{width:216px;align-items:stretch;padding:14px 12px}
  .logo{display:flex;align-items:center;justify-content:center;gap:0;height:40px;width:44px;margin:0 auto 8px;flex-shrink:0}
  .sidebar:hover .logo,.sidebar.open .logo{justify-content:flex-start;gap:11px;width:100%;padding:0 9px}
  .logo .mark{display:flex;flex-direction:column;gap:4px;flex-shrink:0;transform-origin:center;transform:rotate(90deg);transition:transform .45s cubic-bezier(.5,-0.15,.2,1.15)}
  .logo .mark span{display:block;height:3px;border-radius:9px;background:var(--accent)}
  .logo .mark span:nth-child(1){width:22px}.logo .mark span:nth-child(2){width:14px}.logo .mark span:nth-child(3){width:7px}
  .sidebar:hover .logo .mark,.sidebar.open .logo .mark{transform:rotate(0deg)}
  .logo .name{font-size:15px;font-weight:700;white-space:nowrap;opacity:0;width:0;overflow:hidden;transition:opacity .2s,width .25s}
  .sidebar:hover .logo .name,.sidebar.open .logo .name{opacity:1;width:auto}
  .sep{height:1px;background:var(--border);width:60%;margin:4px auto 8px;flex-shrink:0}
  .sidebar:hover .sep,.sidebar.open .sep{width:100%}
  .nav-item{display:flex;align-items:center;justify-content:center;gap:0;width:44px;height:44px;border-radius:12px;color:var(--muted);
    text-decoration:none;flex-shrink:0;margin:1px auto;transition:background .15s,color .15s,width .2s,padding .2s}
  .sidebar:hover .nav-item,.sidebar.open .nav-item{width:100%;justify-content:flex-start;gap:13px;padding:0 13px;margin:1px 0}
  .nav-item svg{width:20px;height:20px;flex-shrink:0;stroke-width:1.85}
  .nav-item .lbl{font-size:13px;font-weight:500;white-space:nowrap;opacity:0;width:0;overflow:hidden;transition:opacity .2s,width .25s}
  .sidebar:hover .nav-item .lbl,.sidebar.open .nav-item .lbl{opacity:1;width:auto}
  .nav-item:hover{background:rgba(255,255,255,0.06);color:var(--txt)}
  .nav-item.active{background:var(--accent-soft);color:#fff}
  .nav-item.active svg{stroke:#A78BFA}
  /* ===== Mobile (mesmo tema do dash) ===== */
  @media (max-width:768px){
    .sidebar{top:auto;left:8px;right:8px;bottom:8px;width:auto !important;height:60px;flex-direction:row;align-items:center !important;justify-content:space-around;padding:6px 6px !important;gap:2px;border-radius:16px;cursor:default}
    .sidebar:hover,.sidebar.open{width:auto !important;align-items:center;padding:6px 6px}
    .logo,.sep{display:none !important}
    .nav-item{width:auto !important;flex:1;height:46px;justify-content:center !important;gap:0 !important;padding:0 !important;margin:0 !important}
    .sidebar:hover .nav-item,.sidebar.open .nav-item{width:auto;justify-content:center;gap:0;padding:0;margin:0}
    .nav-item .lbl,.sidebar:hover .nav-item .lbl{display:none}
    .topbar{left:8px;right:8px;top:8px;height:48px;padding:0 16px}
    .topbar h1{font-size:15px}
    .topbar .crumb{display:none}
    .frame{top:64px;left:8px;right:8px;bottom:8px}
  }</style></head><body><div class="frame"><iframe src="https://app.powerbi.com/view?r=eyJrIjoiYjI3NDU1ZDMtZGU0ZC00YmFkLTkxOGUtMTViY2IxNjFiZGJkIiwidCI6ImRhZGFhOGQzLTIxYWEtNGRjNS05ODBlLTFiZjI0ZWY5Yzc0OCJ9&navContentPaneEnabled=false&filterPaneEnabled=false&pageName=pgRegioes" allowfullscreen title="Regiões"></iframe></div><header class="topbar"><h1>Regiões</h1><span class="crumb">- Distribuição geográfica</span></header>  <aside class="sidebar" id="sb">
    <div class="logo"><div class="mark"><span></span><span></span><span></span></div><div class="name">IA Vendas</div></div>
    <div class="sep"></div>

    <a class="nav-item" href="Clientes.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span class="lbl">Clientes</span></a>
    <a class="nav-item" href="Produtos.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg><span class="lbl">Produtos</span></a>
    <a class="nav-item" href="Fornecedores.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg><span class="lbl">Fornecedores</span></a>
    <a class="nav-item active" href="Regioes.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><span class="lbl">Regiões</span></a>
    <a class="nav-item" href="Vendas.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg><span class="lbl">Vendas</span></a>
  </aside><script>var sb=document.getElementById('sb');sb.addEventListener('click',function(e){if(e.target.closest('a'))return;sb.classList.toggle('open')});</script></body></html>
